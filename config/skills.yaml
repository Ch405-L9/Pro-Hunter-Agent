      - "web scraping"
      - "API integration"
      - "task automation"
      - "workflow automation"
      - "Playwright"
      - "Selenium"
    must_have:
      - "Python 3.10+"
      - "web scraping (BeautifulSoup, Scrapy, or Playwright)"
      - "REST API integration"
      - "Linux/Ubuntu experience"
